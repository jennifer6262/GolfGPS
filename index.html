<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PinPoint · 골프 거리측정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --rose:#E8547A;--rose-lt:#F2789A;--rose-pale:#FAD4E0;
  --blush:#FDE8EF;--cream:#FFF7F9;--mink:#C4899E;
  --plum:#7A3A52;--sub:#9A6878;--border:#F0C8D8;--white:#fff;
  --sh:0 8px 40px rgba(232,84,122,.13);--sh2:0 2px 12px rgba(232,84,122,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--cream);overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 80% 10%,rgba(242,120,154,.18) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 10% 90%,rgba(232,84,122,.12) 0%,transparent 70%),
             var(--cream);}
.app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;
     max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
header{padding:44px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px;color:var(--rose)}
.logo span{color:var(--plum);font-style:italic}
.gps-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--sub);
  background:var(--white);border:1px solid var(--border);padding:5px 12px;border-radius:20px;box-shadow:var(--sh2)}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .4s}
.dot.on{background:#4CAF50;animation:gp 1.6s infinite}
.dot.err{background:var(--rose)}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.4)}50%{box-shadow:0 0 0 5px rgba(76,175,80,0)}}
main{flex:1;overflow-y:auto;padding:0 20px 28px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
main::-webkit-scrollbar{display:none}
.screen{display:none;flex-direction:column;gap:14px;padding-top:4px}
.screen.active{display:flex}

/* 검색 화면 */
.hero{background:linear-gradient(145deg,var(--plum),#5C2A3E);border-radius:28px;padding:26px 22px;
  box-shadow:0 16px 48px rgba(122,58,82,.3);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-28px;right:-28px;width:120px;height:120px;
  border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.hero h2{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:4px}
.hero p{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px;line-height:1.6}
.srow{display:flex;gap:8px}
.sinput{flex:1;padding:13px 16px;border-radius:13px;border:none;outline:none;
  background:rgba(255,255,255,.13);color:#fff;font-size:15px;font-family:'Noto Sans KR',sans-serif}
.sinput::placeholder{color:rgba(255,255,255,.4)}
.sinput:focus{background:rgba(255,255,255,.2)}
.sbtn{padding:13px 17px;border-radius:13px;border:none;background:var(--rose);color:#fff;
  font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sbtn:active{transform:scale(.92)}

/* 지역 칩 */
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border);background:var(--white);color:var(--sub);
  font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;transition:all .15s}
.chip.on{background:var(--rose);color:#fff;border-color:var(--rose)}

/* 결과 목록 */
.results{background:var(--white);border-radius:16px;border:1px solid var(--border);
  box-shadow:var(--sh);overflow:hidden}
.ri{padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--border);
  -webkit-tap-highlight-color:transparent;transition:background .15s}
.ri:last-child{border-bottom:none}
.ri:active{background:var(--blush)}
.ri .rn{font-size:14px;font-weight:600;color:var(--plum)}
.ri .ra{font-size:11px;color:var(--sub);margin-top:2px}
.empty{padding:20px;text-align:center;font-size:13px;color:var(--sub);line-height:1.7}

/* 지도 화면 */
.cbadge{background:var(--white);border-radius:16px;padding:13px 16px;
  border:1px solid var(--border);box-shadow:var(--sh2);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.cn{font-size:14px;font-weight:600;color:var(--plum)}
.ca{font-size:11px;color:var(--sub);margin-top:2px}
.chbtn{font-size:12px;color:var(--rose);background:var(--blush);border:1px solid var(--rose-pale);
  border-radius:10px;padding:6px 11px;cursor:pointer;white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;flex-shrink:0}
.mapwrap{border-radius:22px;overflow:hidden;box-shadow:var(--sh);position:relative;border:1px solid var(--border)}
#map{width:100%;height:300px;display:block}
.mapguide{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(122,58,82,.85);backdrop-filter:blur(6px);color:#fff;font-size:12px;font-weight:500;
  padding:7px 14px;border-radius:20px;white-space:nowrap;pointer-events:none;z-index:500}
.pinc{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);
  font-size:36px;pointer-events:none;filter:drop-shadow(0 3px 8px rgba(0,0,0,.3));z-index:500}
.maptoggle{position:absolute;bottom:12px;right:12px;z-index:500;
  background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:10px;
  padding:6px 12px;font-size:12px;font-weight:600;color:var(--plum);cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{background:var(--white)!important;color:var(--plum)!important;border:1px solid var(--border)!important}
.leaflet-control-attribution{font-size:9px!important}
.cfmbtn{background:linear-gradient(135deg,var(--rose),var(--rose-lt));color:#fff;border:none;
  border-radius:16px;padding:16px;font-size:16px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  box-shadow:0 6px 24px rgba(232,84,122,.35);width:100%;-webkit-tap-highlight-color:transparent}
.cfmbtn:active{transform:scale(.97)}

/* 거리 화면 */
.dcard{background:linear-gradient(145deg,var(--plum) 0%,#5C2A3E 100%);
  border-radius:28px;padding:36px 28px;box-shadow:0 16px 48px rgba(122,58,82,.35);
  text-align:center;position:relative;overflow:hidden}
.dcard::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.dlabel{font-size:11px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,.5);
  text-transform:uppercase;margin-bottom:8px}
.dval{font-family:'DM Mono',monospace;font-size:82px;font-weight:500;line-height:1;
  color:#fff;letter-spacing:-3px;transition:opacity .25s}
.dunit{font-size:21px;font-weight:300;color:rgba(255,255,255,.55);margin-top:4px;margin-bottom:20px}
.dsub{display:flex;justify-content:center;gap:28px}
.dsi .sv{font-family:'DM Mono',monospace;font-size:17px;color:var(--rose-pale);font-weight:500}
.dsi .sl{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px;letter-spacing:.8px}
.dvr{width:1px;background:rgba(255,255,255,.12);align-self:stretch}
.srow2{display:flex;align-items:center;justify-content:space-between;
  background:var(--white);border-radius:14px;padding:12px 18px;
  border:1px solid var(--border);box-shadow:var(--sh2)}
.srow2 .sl2{font-size:12px;color:var(--sub)}
.srow2 .sv2{font-family:'DM Mono',monospace;font-size:13px;color:var(--rose);font-weight:500}
.brow{display:flex;gap:10px}
.bhalf{flex:1;padding:14px;border-radius:14px;border:none;font-size:13px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent}
.b1{background:var(--blush);color:var(--rose);border:1.5px solid var(--rose-pale)}
.b2{background:var(--blush);color:var(--plum);border:1.5px solid var(--border)}
.b1:active,.b2:active{background:var(--rose-pale)}

.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  background:var(--plum);color:#fff;padding:12px 22px;border-radius:12px;
  font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .4s ease both}
.fu1{animation-delay:.04s}.fu2{animation-delay:.11s}.fu3{animation-delay:.19s}.fu4{animation-delay:.27s}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Pin<span>Point</span></div>
    <div class="gps-badge"><div class="dot" id="dot"></div><span id="gpstxt">GPS 대기</span></div>
  </header>
  <main>

    <!-- 검색 화면 -->
    <div class="screen active" id="s1">
      <div class="hero fu fu1">
        <h2>⛳ 골프장을 검색하세요</h2>
        <p>이름 또는 지역으로 검색 · 전국 주요 골프장 내장</p>
        <div class="srow">
          <input class="sinput" id="kw" type="text" placeholder="예: 유성, 한미르, 제주" autocomplete="off">
          <button class="sbtn" onclick="doSearch()">🔍</button>
        </div>
      </div>
      <div class="chips fu fu2" id="chips"></div>
      <div class="results" id="results" style="display:none"></div>
    </div>

    <!-- 지도 화면 -->
    <div class="screen" id="s2">
      <div class="cbadge fu fu1">
        <div><div class="cn" id="cname">—</div><div class="ca" id="caddr">—</div></div>
        <button class="chbtn" onclick="go(1)">골프장 변경</button>
      </div>
      <div class="mapwrap fu fu2">
        <div id="map"></div>
        <div class="mapguide">지도를 드래그해 📍를 그린에 맞추세요</div>
        <div class="pinc">📍</div>
        <button class="maptoggle" id="mtbtn" onclick="toggleTile()">🗺️ 일반지도</button>
      </div>
      <button class="cfmbtn fu fu3" onclick="confirmPin()">이 위치로 핀 고정하기 ✅</button>
    </div>

    <!-- 거리 화면 -->
    <div class="screen" id="s3">
      <div class="cbadge fu fu1">
        <div><div class="cn" id="dname">—</div><div class="ca" id="daddr">—</div></div>
      </div>
      <div class="dcard fu fu2">
        <div class="dlabel">그린 센터까지</div>
        <div class="dval" id="dm">—</div>
        <div class="dunit">m</div>
        <div class="dsub">
          <div class="dsi"><div class="sv" id="dyd">—</div><div class="sl">야드 (yd)</div></div>
          <div class="dvr"></div>
          <div class="dsi"><div class="sv" id="dft">—</div><div class="sl">피트 (ft)</div></div>
        </div>
      </div>
      <div class="srow2 fu fu3">
        <span class="sl2">📍 GPS 정확도</span>
        <span class="sv2" id="acc">측정 중...</span>
      </div>
      <div class="brow fu fu4">
        <button class="bhalf b1" onclick="go(2)">📍 핀 다시 찍기</button>
        <button class="bhalf b2" onclick="refresh()">🔄 위치 새로고침</button>
      </div>
    </div>

  </main>
</div>
<div class="toast" id="toast"></div>

  {n:"스카이힐제주CC",a:"제주 제주시",r:"제주",lat:33.4234,lng:126.3823},

const REGIONS = ["전체","대전·충청","서울·경기","강원","경상","전라","제주"];

// ── 상태
let uPos=null, pin=null, map=null, wid=null;
let curRegion=null;
let tileSat=null, tileStr=null, tileMode='sat';

// ── 유틸
const yd=m=>Math.round(m*1.09361), ft=m=>Math.round(m*3.28084);
function hav(a,b,c,d){
  const R=6371000,r=x=>x*Math.PI/180,dL=r(c-a),dO=r(d-b);
  const q=Math.sin(dL/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dO/2)**2;
  return R*2*Math.asin(Math.min(1,Math.sqrt(q)));
}

// ── 화면
function go(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

// ── GPS
function startGPS(){
  if(wid||!navigator.geolocation)return;
  setDot('wait','연결 중...');
  wid=navigator.geolocation.watchPosition(p=>{
    uPos={lat:p.coords.latitude,lng:p.coords.longitude};
    setDot('on','GPS 연결됨');
    document.getElementById('acc').textContent='±'+Math.round(p.coords.accuracy)+'m';
    drawDist();
  },()=>setDot('err','GPS 오류'),{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}
function refresh(){
  navigator.geolocation.getCurrentPosition(p=>{
    uPos={lat:p.coords.latitude,lng:p.coords.longitude};
    document.getElementById('acc').textContent='±'+Math.round(p.coords.accuracy)+'m';
    drawDist(); toast('위치를 업데이트했습니다');
  },()=>toast('위치 업데이트 실패'),{enableHighAccuracy:true,timeout:10000});
}
function setDot(s,t){
  const d=document.getElementById('dot');
  d.className='dot'+(s==='on'?' on':s==='err'?' err':'');
  document.getElementById('gpstxt').textContent=t;
}

// ── 지역 칩
(function(){
  const wrap=document.getElementById('chips');
  REGIONS.forEach(r=>{
    const b=document.createElement('button');
    b.className='chip'+(r==='전체'?' on':'');
    b.textContent=r;
    b.onclick=()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
      curRegion=(r==='전체'?null:r);
      document.getElementById('kw').value='';
      showList(curRegion,null);
    };
    wrap.appendChild(b);
  });
  showList(null,null); // 초기 전체 목록
})();

// ── 목록 표시
function showList(region, kw){
  const box=document.getElementById('results');
  let list=[...DB];
  if(region) list=list.filter(c=>c.r===region);
  if(kw && kw.trim()) list=list.filter(c=>c.n.includes(kw.trim())||c.a.includes(kw.trim()));
  box.style.display='block';
  if(!list.length){
    box.innerHTML='<div class="empty">검색 결과가 없어요.<br>다른 이름이나 지역으로 시도해보세요.</div>';
    return;
  }
  box._d=list;
  box.innerHTML=list.map((c,i)=>
    '<div class="ri" onclick="pick('+i+')"><div class="rn">'+c.n+'</div><div class="ra">'+c.a+'</div></div>'
  ).join('');
}

// ── 검색
function doSearch(){
  const kw=document.getElementById('kw').value;
  if(!kw.trim()){toast('골프장 이름을 입력해주세요');return}
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('.chip').classList.add('on');
  curRegion=null;
  showList(null,kw);
}

// ── 골프장 선택
function pick(i){
  const c=document.getElementById('results')._d[i];
  document.getElementById('cname').textContent=c.n;
  document.getElementById('caddr').textContent=c.a;
  document.getElementById('dname').textContent=c.n;
  document.getElementById('daddr').textContent=c.a;
  go(2);
  initMap(c.lat,c.lng);
  startGPS();
}

// ── 지도
function initMap(lat,lng){
  if(map){map.setView([lat,lng],17);return}
  map=L.map('map',{center:[lat,lng],zoom:17});
  tileSat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    attribution:'Tiles © Esri',maxZoom:19});
  tileStr=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',maxZoom:19});
  tileSat.addTo(map);
  tileMode='sat';
}
function toggleTile(){
  if(!map)return;
  const btn=document.getElementById('mtbtn');
  if(tileMode==='sat'){
    map.removeLayer(tileSat); tileStr.addTo(map);
    tileMode='str'; btn.textContent='🛰️ 위성지도';
  } else {
    map.removeLayer(tileStr); tileSat.addTo(map);
    tileMode='sat'; btn.textContent='🗺️ 일반지도';
  }
}

// ── 핀 고정
function confirmPin(){
  if(!map){toast('지도를 불러오는 중입니다');return}
  const c=map.getCenter();
  pin={lat:c.lat,lng:c.lng};
  go(3);
  if(uPos)drawDist();
  else toast('GPS 신호를 기다리는 중이에요');
}

// ── 거리 표시
function drawDist(){
  if(!pin||!uPos)return;
  const m=hav(uPos.lat,uPos.lng,pin.lat,pin.lng);
  const el=document.getElementById('dm');
  el.style.opacity='.2';
  setTimeout(()=>{
    el.textContent=Math.round(m);
    document.getElementById('dyd').textContent=yd(m);
    document.getElementById('dft').textContent=ft(m);
    el.style.opacity='1';
  },200);
}

// ── 이벤트
document.getElementById('kw').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

// ── 토스트
let _t;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_t); _t=setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
</body>
</html>
