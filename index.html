<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PinPoint · 골프 거리측정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=594013998fcbe5d185c00dc5ec47a023&libraries=services"></script>
<style>
  :root {
    --rose:      #E8547A;
    --rose-lt:   #F2789A;
    --rose-pale: #FAD4E0;
    --blush:     #FDE8EF;
    --cream:     #FFF7F9;
    --mink:      #C4899E;
    --plum:      #7A3A52;
    --txt:       #2E1A23;
    --sub:       #9A6878;
    --border:    #F0C8D8;
    --white:     #FFFFFF;
    --shadow:    0 8px 40px rgba(232,84,122,0.13);
    --shadow-sm: 0 2px 12px rgba(232,84,122,0.10);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    height:100%; font-family:'Noto Sans KR',sans-serif;
    background:var(--cream); color:var(--txt); overflow:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(242,120,154,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 10% 90%, rgba(232,84,122,0.12) 0%, transparent 70%),
      var(--cream);
    pointer-events:none;
  }
  .app {
    position:relative; z-index:1;
    height:100dvh; display:flex; flex-direction:column;
    max-width:430px; margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* header */
  header {
    padding:48px 24px 14px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .logo { font-family:'DM Serif Display',serif; font-size:26px; letter-spacing:-0.5px; color:var(--rose); }
  .logo span { color:var(--plum); font-style:italic; }
  .gps-badge {
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-weight:500; color:var(--sub);
    background:var(--white); border:1px solid var(--border);
    padding:5px 12px; border-radius:20px; box-shadow:var(--shadow-sm);
  }
  .dot { width:7px; height:7px; border-radius:50%; background:#ccc; transition:background .4s; }
  .dot.active { background:#4CAF50; animation:pulse 1.6s infinite; }
  .dot.error  { background:var(--rose); }
  @keyframes pulse {
    0%,100% { box-shadow:0 0 0 0 rgba(76,175,80,.4); }
    50%      { box-shadow:0 0 0 5px rgba(76,175,80,0); }
  }

  /* scroll */
  main {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:0 20px 24px; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  main::-webkit-scrollbar { display:none; }

  /* screens */
  .screen { display:none; flex-direction:column; gap:14px; }
  .screen.active { display:flex; }

  /* ── SCREEN 1: 검색 ── */
  #screen-search { padding-top:4px; }

  .search-hero {
    background:linear-gradient(145deg, var(--plum), #5C2A3E);
    border-radius:28px; padding:28px 24px;
    box-shadow:0 16px 48px rgba(122,58,82,.3);
    position:relative; overflow:hidden;
  }
  .search-hero::before {
    content:''; position:absolute; top:-30px; right:-30px;
    width:130px; height:130px; border-radius:50%;
    background:rgba(255,255,255,.06);
  }
  .search-hero h2 {
    font-family:'DM Serif Display',serif; font-size:21px;
    color:#fff; margin-bottom:5px; position:relative;
  }
  .search-hero p { font-size:12px; color:rgba(255,255,255,.5); position:relative; margin-bottom:18px; }

  .search-row { display:flex; gap:8px; position:relative; }
  .search-input {
    flex:1; padding:13px 16px; border-radius:13px;
    border:none; outline:none;
    background:rgba(255,255,255,.13);
    color:#fff; font-size:15px;
    font-family:'Noto Sans KR',sans-serif;
    backdrop-filter:blur(8px);
  }
  .search-input::placeholder { color:rgba(255,255,255,.38); }
  .search-input:focus { background:rgba(255,255,255,.2); }

  .btn-search {
    padding:13px 17px; border-radius:13px; border:none;
    background:var(--rose); color:#fff; font-size:18px;
    cursor:pointer; transition:transform .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-search:active { transform:scale(.92); }

  .search-results {
    background:var(--white); border-radius:16px;
    border:1px solid var(--border); box-shadow:var(--shadow);
    overflow:hidden; display:none;
  }
  .search-results.show { display:block; }
  .result-item {
    padding:13px 18px; cursor:pointer;
    border-bottom:1px solid var(--border);
    transition:background .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .result-item:last-child { border-bottom:none; }
  .result-item:active { background:var(--blush); }
  .result-item .r-name { font-size:14px; font-weight:600; color:var(--plum); }
  .result-item .r-addr { font-size:11px; color:var(--sub); margin-top:2px; }
  .result-empty { padding:20px; text-align:center; font-size:13px; color:var(--sub); }

  .placeholder {
    background:var(--white); border-radius:24px; padding:38px 24px;
    text-align:center; border:1.5px dashed var(--border);
  }
  .placeholder .ico { font-size:44px; margin-bottom:12px; }
  .placeholder p { font-size:13px; color:var(--sub); line-height:1.85; }

  /* ── SCREEN 2: 지도 ── */
  #screen-map { gap:12px; padding-top:4px; }

  .course-badge {
    background:var(--white); border-radius:16px; padding:13px 16px;
    border:1px solid var(--border); box-shadow:var(--shadow-sm);
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .course-badge .c-name { font-size:14px; font-weight:600; color:var(--plum); }
  .course-badge .c-addr { font-size:11px; color:var(--sub); margin-top:2px; }
  .btn-change {
    font-size:12px; color:var(--rose); background:var(--blush);
    border:1px solid var(--rose-pale); border-radius:10px;
    padding:6px 11px; cursor:pointer; white-space:nowrap;
    font-family:'Noto Sans KR',sans-serif; flex-shrink:0;
    -webkit-tap-highlight-color:transparent;
  }

  .map-wrap {
    border-radius:22px; overflow:hidden;
    box-shadow:var(--shadow); position:relative;
    border:1px solid var(--border);
  }
  #kakao-map { width:100%; height:300px; display:block; }

  .map-guide {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:rgba(122,58,82,.85); backdrop-filter:blur(6px);
    color:#fff; font-size:12px; font-weight:500;
    padding:7px 14px; border-radius:20px; white-space:nowrap;
    pointer-events:none; z-index:5;
  }
  .pin-center {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%, -100%);
    font-size:34px; pointer-events:none;
    filter:drop-shadow(0 3px 8px rgba(0,0,0,.3));
    z-index:10; transition:transform .1s;
  }

  .btn-confirm {
    background:linear-gradient(135deg, var(--rose), var(--rose-lt));
    color:#fff; border:none; border-radius:16px;
    padding:16px; font-size:16px; font-weight:600;
    font-family:'Noto Sans KR',sans-serif; cursor:pointer;
    box-shadow:0 6px 24px rgba(232,84,122,.35);
    transition:transform .15s; width:100%;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-confirm:active { transform:scale(.97); }

  /* ── SCREEN 3: 거리 ── */
  #screen-dist { gap:14px; padding-top:4px; }

  .distance-card {
    background:linear-gradient(145deg, var(--plum) 0%, #5C2A3E 100%);
    border-radius:28px; padding:36px 28px;
    box-shadow:0 16px 48px rgba(122,58,82,.35);
    text-align:center; position:relative; overflow:hidden;
  }
  .distance-card::before {
    content:''; position:absolute; top:-40px; right:-40px;
    width:160px; height:160px; border-radius:50%;
    background:rgba(255,255,255,.05);
  }
  .dist-label { font-size:11px; font-weight:500; letter-spacing:2px; color:rgba(255,255,255,.5); text-transform:uppercase; margin-bottom:8px; }
  .dist-value {
    font-family:'DM Mono',monospace; font-size:82px; font-weight:500;
    line-height:1; color:#fff; letter-spacing:-3px;
    transition:opacity .25s;
  }
  .dist-unit { font-size:21px; font-weight:300; color:rgba(255,255,255,.55); margin-top:4px; margin-bottom:20px; }
  .dist-sub { display:flex; justify-content:center; gap:28px; }
  .dist-sub-item .val { font-family:'DM Mono',monospace; font-size:17px; color:var(--rose-pale); font-weight:500; }
  .dist-sub-item .lbl { font-size:10px; color:rgba(255,255,255,.38); margin-top:2px; letter-spacing:.8px; }
  .divider-v { width:1px; background:rgba(255,255,255,.12); align-self:stretch; }

  .status-row {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--white); border-radius:14px; padding:12px 18px;
    border:1px solid var(--border); box-shadow:var(--shadow-sm);
  }
  .status-row .lbl { font-size:12px; color:var(--sub); }
  .status-row .val { font-family:'DM Mono',monospace; font-size:13px; color:var(--rose); font-weight:500; }

  .btn-row { display:flex; gap:10px; }
  .btn-half {
    flex:1; padding:14px; border-radius:14px; border:none;
    font-size:13px; font-weight:600; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; transition:background .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-repin  { background:var(--blush); color:var(--rose);  border:1.5px solid var(--rose-pale); }
  .btn-reload { background:var(--blush); color:var(--plum);  border:1.5px solid var(--border); }
  .btn-repin:active, .btn-reload:active { background:var(--rose-pale); }

  /* toast */
  .toast {
    position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
    background:var(--plum); color:#fff; padding:12px 22px;
    border-radius:12px; font-size:13px; font-weight:500;
    box-shadow:0 8px 24px rgba(0,0,0,.2); opacity:0;
    pointer-events:none; transition:opacity .3s;
    white-space:nowrap; z-index:999;
  }
  .toast.show { opacity:1; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fu  { animation:fadeUp .4s ease both; }
  .fu1 { animation-delay:.04s; }
  .fu2 { animation-delay:.11s; }
  .fu3 { animation-delay:.19s; }
  .fu4 { animation-delay:.27s; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Pin<span>Point</span></div>
    <div class="gps-badge">
      <div class="dot" id="gps-dot"></div>
      <span id="gps-status-text">GPS 대기</span>
    </div>
  </header>

  <main>

    <!-- SCREEN 1: 골프장 검색 -->
    <div class="screen active" id="screen-search">
      <div class="search-hero fu fu1">
        <h2>⛳ 골프장을 검색하세요</h2>
        <p>골프장 이름 또는 지역을 입력해주세요</p>
        <div class="search-row">
          <input class="search-input" id="search-input"
            type="text" placeholder="예: 제주 핀크스 골프클럽"
            autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="btn-search" onclick="searchCourse()">🔍</button>
        </div>
      </div>

      <div class="search-results" id="search-results"></div>

      <div class="placeholder fu fu2">
        <div class="ico">🏌️‍♀️</div>
        <p>골프장을 검색하면<br>카카오맵에서 그린 센터를 직접 찍고<br>내 위치에서 핀까지 거리를 바로 알 수 있어요</p>
      </div>
    </div>

    <!-- SCREEN 2: 지도에서 핀 찍기 -->
    <div class="screen" id="screen-map">
      <div class="course-badge fu fu1">
        <div>
          <div class="c-name" id="badge-name">—</div>
          <div class="c-addr" id="badge-addr">—</div>
        </div>
        <button class="btn-change" onclick="goSearch()">골프장 변경</button>
      </div>

      <div class="map-wrap fu fu2">
        <div id="kakao-map"></div>
        <div class="map-guide">지도를 드래그해 📍를 그린에 맞추세요</div>
        <div class="pin-center">📍</div>
      </div>

      <button class="btn-confirm fu fu3" onclick="confirmPin()">
        이 위치로 핀 고정하기 ✅
      </button>
    </div>

    <!-- SCREEN 3: 거리 측정 -->
    <div class="screen" id="screen-dist">
      <div class="course-badge fu fu1">
        <div>
          <div class="c-name" id="dist-course-name">—</div>
          <div class="c-addr" id="dist-course-addr">—</div>
        </div>
      </div>

      <div class="distance-card fu fu2">
        <div class="dist-label">그린 센터까지</div>
        <div class="dist-value" id="dist-yd">—</div>
        <div class="dist-unit">yards</div>
        <div class="dist-sub">
          <div class="dist-sub-item">
            <div class="val" id="dist-m">—</div>
            <div class="lbl">미터</div>
          </div>
          <div class="divider-v"></div>
          <div class="dist-sub-item">
            <div class="val" id="dist-ft">—</div>
            <div class="lbl">피트</div>
          </div>
        </div>
      </div>

      <div class="status-row fu fu3">
        <span class="lbl">📍 GPS 정확도</span>
        <span class="val" id="accuracy-val">측정 중...</span>
      </div>

      <div class="btn-row fu fu4">
        <button class="btn-half btn-repin"  onclick="goMap()">📍 핀 다시 찍기</button>
        <button class="btn-half btn-reload" onclick="forceUpdate()">🔄 위치 새로고침</button>
      </div>
    </div>

  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ── 상태 */
let userPos   = null;
let pinLatLng = null;
let kakaoMap  = null;
let watchId   = null;
let ps        = null;
let selectedCourse = null;

/* ── 거리 계산 */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, r = d => d * Math.PI / 180;
  const dLat = r(lat2-lat1), dLon = r(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.min(1, Math.sqrt(a)));
}
const toYd = m => Math.round(m * 1.09361);
const toFt = m => Math.round(m * 3.28084);

/* ── 화면 전환 */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goSearch() { showScreen('screen-search'); }
function goMap()    { showScreen('screen-map'); }

/* ── GPS */
function startGPS() {
  if (watchId) return;
  if (!navigator.geolocation) { setGPS('error','GPS 미지원'); return; }
  setGPS('waiting','연결 중...');
  watchId = navigator.geolocation.watchPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      setGPS('active','GPS 연결됨');
      document.getElementById('accuracy-val').textContent = `±${Math.round(pos.coords.accuracy)}m`;
      updateDist();
    },
    () => setGPS('error','GPS 오류'),
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
}
function forceUpdate() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = { lat:pos.coords.latitude, lng:pos.coords.longitude };
      document.getElementById('accuracy-val').textContent = `±${Math.round(pos.coords.accuracy)}m`;
      updateDist();
      showToast('위치를 업데이트했습니다');
    },
    () => showToast('위치 업데이트에 실패했습니다'),
    { enableHighAccuracy:true, timeout:10000 }
  );
}
function setGPS(state, text) {
  const dot = document.getElementById('gps-dot');
  dot.className = 'dot' + (state==='active' ? ' active' : state==='error' ? ' error' : '');
  document.getElementById('gps-status-text').textContent = text;
}

/* ── 골프장 검색 */
function searchCourse() {
  const kw = document.getElementById('search-input').value.trim();
  if (!kw) { showToast('골프장 이름을 입력해주세요'); return; }
  if (!ps) ps = new kakao.maps.services.Places();
  ps.keywordSearch(kw + ' 골프장', (data, status) => {
    const box = document.getElementById('search-results');
    if (status !== kakao.maps.services.Status.OK || !data.length) {
      box.innerHTML = '<div class="result-empty">검색 결과가 없어요. 다른 이름으로 시도해보세요.</div>';
      box.classList.add('show'); return;
    }
    const list = data.slice(0, 7);
    box._data = list;
    box.innerHTML = list.map((p, i) => `
      <div class="result-item" onclick="selectCourse(${i})">
        <div class="r-name">${p.place_name}</div>
        <div class="r-addr">${p.road_address_name || p.address_name}</div>
      </div>`).join('');
    box.classList.add('show');
  });
}

function selectCourse(i) {
  const box = document.getElementById('search-results');
  const p = box._data[i];
  selectedCourse = p;

  ['badge-name','dist-course-name'].forEach(id => document.getElementById(id).textContent = p.place_name);
  const addr = p.road_address_name || p.address_name;
  ['badge-addr','dist-course-addr'].forEach(id => document.getElementById(id).textContent = addr);

  box.classList.remove('show');
  showScreen('screen-map');
  loadMap(parseFloat(p.y), parseFloat(p.x));
  startGPS();
}

/* ── 지도 */
function loadMap(lat, lng) {
  const el = document.getElementById('kakao-map');
  const center = new kakao.maps.LatLng(lat, lng);
  if (kakaoMap) {
    kakaoMap.setCenter(center);
    kakaoMap.setLevel(3);
    return;
  }
  kakaoMap = new kakao.maps.Map(el, { center, level:3 });
}

/* ── 핀 고정 */
function confirmPin() {
  if (!kakaoMap) { showToast('지도를 불러오는 중입니다'); return; }
  const c = kakaoMap.getCenter();
  pinLatLng = { lat: c.getLat(), lng: c.getLng() };
  showScreen('screen-dist');
  if (userPos) updateDist();
  else showToast('GPS 신호를 기다리는 중이에요. 잠시 후 자동으로 표시됩니다.');
}

/* ── 거리 표시 */
function updateDist() {
  if (!pinLatLng || !userPos) return;
  const m = haversine(userPos.lat, userPos.lng, pinLatLng.lat, pinLatLng.lng);
  const el = document.getElementById('dist-yd');
  el.style.opacity = '.25';
  setTimeout(() => {
    el.textContent = toYd(m);
    document.getElementById('dist-m').textContent  = Math.round(m) + 'm';
    document.getElementById('dist-ft').textContent = toFt(m) + 'ft';
    el.style.opacity = '1';
  }, 200);
}

/* ── 엔터 검색 */
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchCourse();
});

/* ── 토스트 */
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
</body>
</html>
