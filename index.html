<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PinPoint · 골프 거리측정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --rose:#E8547A; --rose-lt:#F2789A; --rose-pale:#FAD4E0;
    --blush:#FDE8EF; --cream:#FFF7F9; --mink:#C4899E;
    --plum:#7A3A52; --txt:#2E1A23; --sub:#9A6878;
    --border:#F0C8D8; --white:#FFFFFF;
    --shadow:0 8px 40px rgba(232,84,122,0.13);
    --shadow-sm:0 2px 12px rgba(232,84,122,0.10);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--txt);overflow:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 80% 10%,rgba(242,120,154,.18) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 10% 90%,rgba(232,84,122,.12) 0%,transparent 70%),var(--cream);pointer-events:none}
  .app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
  header{padding:44px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .logo{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px;color:var(--rose)}
  .logo span{color:var(--plum);font-style:italic}
  .gps-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--sub);background:var(--white);border:1px solid var(--border);padding:5px 12px;border-radius:20px;box-shadow:var(--shadow-sm)}
  .dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .4s}
  .dot.active{background:#4CAF50;animation:gpsPulse 1.6s infinite}
  .dot.error{background:var(--rose)}
  @keyframes gpsPulse{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.4)}50%{box-shadow:0 0 0 5px rgba(76,175,80,0)}}
  main{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 28px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  main::-webkit-scrollbar{display:none}
  .screen{display:none;flex-direction:column;gap:14px;padding-top:4px}
  .screen.active{display:flex}
  .search-hero{background:linear-gradient(145deg,var(--plum),#5C2A3E);border-radius:28px;padding:26px 22px;box-shadow:0 16px 48px rgba(122,58,82,.3);position:relative;overflow:hidden}
  .search-hero::before{content:'';position:absolute;top:-28px;right:-28px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
  .search-hero h2{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:4px;position:relative}
  .search-hero p{font-size:12px;color:rgba(255,255,255,.48);position:relative;margin-bottom:16px;line-height:1.6}
  .search-row{display:flex;gap:8px}
  .search-input{flex:1;padding:13px 16px;border-radius:13px;border:none;outline:none;background:rgba(255,255,255,.13);color:#fff;font-size:15px;font-family:'Noto Sans KR',sans-serif;backdrop-filter:blur(8px)}
  .search-input::placeholder{color:rgba(255,255,255,.38)}
  .search-input:focus{background:rgba(255,255,255,.2)}
  .btn-search{padding:13px 17px;border-radius:13px;border:none;background:var(--rose);color:#fff;font-size:18px;cursor:pointer;transition:transform .15s;-webkit-tap-highlight-color:transparent}
  .btn-search:active{transform:scale(.92)}
  .search-results{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;display:none}
  .search-results.show{display:block}
  .result-item{padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;-webkit-tap-highlight-color:transparent}
  .result-item:last-child{border-bottom:none}
  .result-item:active{background:var(--blush)}
  .result-item .r-name{font-size:14px;font-weight:600;color:var(--plum)}
  .result-item .r-addr{font-size:11px;color:var(--sub);margin-top:2px}
  .result-loading,.result-empty{padding:20px;text-align:center;font-size:13px;color:var(--sub)}
  .result-loading{display:flex;align-items:center;justify-content:center;gap:8px}
  .spinner{width:16px;height:16px;border-radius:50%;border:2px solid var(--rose-pale);border-top-color:var(--rose);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .placeholder{background:var(--white);border-radius:24px;padding:38px 24px;text-align:center;border:1.5px dashed var(--border)}
  .placeholder .ico{font-size:44px;margin-bottom:12px}
  .placeholder p{font-size:13px;color:var(--sub);line-height:1.85}
  .course-badge{background:var(--white);border-radius:16px;padding:13px 16px;border:1px solid var(--border);box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .c-name{font-size:14px;font-weight:600;color:var(--plum)}
  .c-addr{font-size:11px;color:var(--sub);margin-top:2px}
  .btn-change{font-size:12px;color:var(--rose);background:var(--blush);border:1px solid var(--rose-pale);border-radius:10px;padding:6px 11px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;flex-shrink:0;-webkit-tap-highlight-color:transparent}
  .map-wrap{border-radius:22px;overflow:hidden;box-shadow:var(--shadow);position:relative;border:1px solid var(--border)}
  #osm-map{width:100%;height:300px;display:block}
  .leaflet-control-zoom{border:none!important}
  .leaflet-control-zoom a{background:var(--white)!important;color:var(--plum)!important;border:1px solid var(--border)!important}
  .leaflet-control-attribution{font-size:9px!important}
  .map-guide{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(122,58,82,.85);backdrop-filter:blur(6px);color:#fff;font-size:12px;font-weight:500;padding:7px 14px;border-radius:20px;white-space:nowrap;pointer-events:none;z-index:500}
  .pin-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-100%);font-size:36px;pointer-events:none;filter:drop-shadow(0 3px 8px rgba(0,0,0,.3));z-index:500}
  .btn-confirm{background:linear-gradient(135deg,var(--rose),var(--rose-lt));color:#fff;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;box-shadow:0 6px 24px rgba(232,84,122,.35);transition:transform .15s;width:100%;-webkit-tap-highlight-color:transparent}
  .btn-confirm:active{transform:scale(.97)}
  .distance-card{background:linear-gradient(145deg,var(--plum) 0%,#5C2A3E 100%);border-radius:28px;padding:36px 28px;box-shadow:0 16px 48px rgba(122,58,82,.35);text-align:center;position:relative;overflow:hidden}
  .distance-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
  .dist-label{font-size:11px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:8px}
  .dist-value{font-family:'DM Mono',monospace;font-size:82px;font-weight:500;line-height:1;color:#fff;letter-spacing:-3px;transition:opacity .25s}
  .dist-unit{font-size:21px;font-weight:300;color:rgba(255,255,255,.55);margin-top:4px;margin-bottom:20px}
  .dist-sub{display:flex;justify-content:center;gap:28px}
  .dist-sub-item .val{font-family:'DM Mono',monospace;font-size:17px;color:var(--rose-pale);font-weight:500}
  .dist-sub-item .lbl{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px;letter-spacing:.8px}
  .divider-v{width:1px;background:rgba(255,255,255,.12);align-self:stretch}
  .status-row{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:14px;padding:12px 18px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
  .status-row .lbl{font-size:12px;color:var(--sub)}
  .status-row .val{font-family:'DM Mono',monospace;font-size:13px;color:var(--rose);font-weight:500}
  .btn-row{display:flex;gap:10px}
  .btn-half{flex:1;padding:14px;border-radius:14px;border:none;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .2s;-webkit-tap-highlight-color:transparent}
  .btn-repin{background:var(--blush);color:var(--rose);border:1.5px solid var(--rose-pale)}
  .btn-reload{background:var(--blush);color:var(--plum);border:1.5px solid var(--border)}
  .btn-repin:active,.btn-reload:active{background:var(--rose-pale)}
  .toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:var(--plum);color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:9999}
  .toast.show{opacity:1}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fadeUp .4s ease both}
  .fu1{animation-delay:.04s}.fu2{animation-delay:.11s}.fu3{animation-delay:.19s}.fu4{animation-delay:.27s}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Pin<span>Point</span></div>
    <div class="gps-badge">
      <div class="dot" id="gps-dot"></div>
      <span id="gps-status">GPS 대기</span>
    </div>
  </header>
  <main>
    <!-- SCREEN 1 -->
    <div class="screen active" id="s-search">
      <div class="search-hero fu fu1">
        <h2>⛳ 골프장을 검색하세요</h2>
        <p>골프장 이름 또는 지역을 입력해주세요<br>OpenStreetMap 기반 · 완전 무료</p>
        <div class="search-row">
          <input class="search-input" id="search-input" type="text"
            placeholder="예: 유성 골프장, 제주 핀크스"
            autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="btn-search" id="btn-search-go">🔍</button>
        </div>
      </div>
      <div class="search-results" id="search-results"></div>
      <div class="placeholder fu fu2">
        <div class="ico">🏌️‍♀️</div>
        <p>골프장을 검색하면<br>지도에서 그린 센터를 직접 찍고<br>내 위치에서 핀까지 거리를 확인해요<br><br>
        <small style="color:var(--mink);font-size:11px;">📡 OpenStreetMap · Nominatim<br>완전 무료 · API 키 불필요</small></p>
      </div>
    </div>
    <!-- SCREEN 2 -->
    <div class="screen" id="s-map">
      <div class="course-badge fu fu1">
        <div>
          <div class="c-name" id="badge-name">—</div>
          <div class="c-addr" id="badge-addr">—</div>
        </div>
        <button class="btn-change" onclick="goSearch()">골프장 변경</button>
      </div>
      <div class="map-wrap fu fu2">
        <div id="osm-map"></div>
        <div class="map-guide">지도를 드래그해 📍를 그린에 맞추세요</div>
        <div class="pin-center">📍</div>
      </div>
      <button class="btn-confirm fu fu3" onclick="confirmPin()">이 위치로 핀 고정하기 ✅</button>
    </div>
    <!-- SCREEN 3 -->
    <div class="screen" id="s-dist">
      <div class="course-badge fu fu1">
        <div>
          <div class="c-name" id="dist-name">—</div>
          <div class="c-addr" id="dist-addr">—</div>
        </div>
      </div>
      <div class="distance-card fu fu2">
        <div class="dist-label">그린 센터까지</div>
        <div class="dist-value" id="dist-yd">—</div>
        <div class="dist-unit">yards</div>
        <div class="dist-sub">
          <div class="dist-sub-item">
            <div class="val" id="dist-m">—</div>
            <div class="lbl">미터</div>
          </div>
          <div class="divider-v"></div>
          <div class="dist-sub-item">
            <div class="val" id="dist-ft">—</div>
            <div class="lbl">피트</div>
          </div>
        </div>
      </div>
      <div class="status-row fu fu3">
        <span class="lbl">📍 GPS 정확도</span>
        <span class="val" id="accuracy-val">측정 중...</span>
      </div>
      <div class="btn-row fu fu4">
        <button class="btn-half btn-repin" onclick="goMap()">📍 핀 다시 찍기</button>
        <button class="btn-half btn-reload" onclick="forceUpdate()">🔄 위치 새로고침</button>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script>
let userPos=null,pinLatLng=null,map=null,watchId=null;
function haversine(la1,lo1,la2,lo2){const R=6371000,r=d=>d*Math.PI/180,dL=r(la2-la1),dO=r(lo2-lo1),a=Math.sin(dL/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dO/2)**2;return R*2*Math.asin(Math.min(1,Math.sqrt(a)))}
const toYd=m=>Math.round(m*1.09361),toFt=m=>Math.round(m*3.28084);
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goSearch(){showScreen('s-search')}
function goMap(){showScreen('s-map')}
function startGPS(){
  if(watchId||!navigator.geolocation)return;
  setGPS('waiting','연결 중...');
  watchId=navigator.geolocation.watchPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    setGPS('active','GPS 연결됨');
    document.getElementById('accuracy-val').textContent='±'+Math.round(pos.coords.accuracy)+'m';
    updateDist();
  },()=>setGPS('error','GPS 오류'),{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}
function forceUpdate(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    document.getElementById('accuracy-val').textContent='±'+Math.round(pos.coords.accuracy)+'m';
    updateDist();showToast('위치를 업데이트했습니다');
  },()=>showToast('위치 업데이트에 실패했습니다'),{enableHighAccuracy:true,timeout:10000});
}
function setGPS(state,text){
  const dot=document.getElementById('gps-dot');
  dot.className='dot'+(state==='active'?' active':state==='error'?' error':'');
  document.getElementById('gps-status').textContent=text;
}
async function searchCourse(){
  const kw=document.getElementById('search-input').value.trim();
  if(!kw){showToast('골프장 이름을 입력해주세요');return}
  const box=document.getElementById('search-results');
  box.innerHTML='<div class="result-loading"><div class="spinner"></div> 검색 중...</div>';
  box.classList.add('show');
  try{
    const url='https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(kw+' 골프')+'&countrycodes=kr&format=json&limit=8&addressdetails=1&accept-language=ko';
    const res=await fetch(url,{headers:{'Accept-Language':'ko'}});
    const data=await res.json();
    if(!data.length){box.innerHTML='<div class="result-empty">검색 결과가 없어요.<br>다른 이름으로 시도해보세요.</div>';return}
    box._data=data;
    box.innerHTML=data.map((p,i)=>{
      const name=p.namedetails&&p.namedetails.name?p.namedetails.name:p.display_name.split(',')[0];
      const addr=p.display_name.split(',').slice(1,3).join(', ').trim();
      return '<div class="result-item" onclick="selectCourse('+i+')"><div class="r-name">'+name+'</div><div class="r-addr">'+addr+'</div></div>';
    }).join('');
  }catch(e){box.innerHTML='<div class="result-empty">검색 실패. 인터넷 연결을 확인해주세요.</div>'}
}
function selectCourse(i){
  const box=document.getElementById('search-results'),p=box._data[i];
  const name=p.namedetails&&p.namedetails.name?p.namedetails.name:p.display_name.split(',')[0];
  const addr=p.display_name.split(',').slice(1,3).join(', ').trim();
  ['badge-name','dist-name'].forEach(id=>document.getElementById(id).textContent=name);
  ['badge-addr','dist-addr'].forEach(id=>document.getElementById(id).textContent=addr);
  box.classList.remove('show');
  showScreen('s-map');
  loadMap(parseFloat(p.lat),parseFloat(p.lon));
  startGPS();
}
function loadMap(lat,lng){
  if(map){map.setView([lat,lng],17);return}
  map=L.map('osm-map',{center:[lat,lng],zoom:17,zoomControl:true,attributionControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom:19
  }).addTo(map);
}
function confirmPin(){
  if(!map){showToast('지도를 불러오는 중입니다');return}
  const c=map.getCenter();
  pinLatLng={lat:c.lat,lng:c.lng};
  showScreen('s-dist');
  if(userPos)updateDist();
  else showToast('GPS 신호를 기다리는 중이에요. 잠시 후 자동으로 표시됩니다.');
}
function updateDist(){
  if(!pinLatLng||!userPos)return;
  const m=haversine(userPos.lat,userPos.lng,pinLatLng.lat,pinLatLng.lng);
  const el=document.getElementById('dist-yd');
  el.style.opacity='.2';
  setTimeout(()=>{
    el.textContent=toYd(m);
    document.getElementById('dist-m').textContent=Math.round(m)+'m';
    document.getElementById('dist-ft').textContent=toFt(m)+'ft';
    el.style.opacity='1';
  },200);
}
document.getElementById('btn-search-go').addEventListener('click',searchCourse);
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')searchCourse()});
let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3200)}
</script>
</body>
</html>
