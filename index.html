<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PinPoint · 골프 거리측정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=76ebcb1469df6b7e62c8a24e9be6cf51&libraries=services"></script>
<style>
:root{
  --rose:#E8547A;--rose-lt:#F2789A;--rose-pale:#FAD4E0;
  --blush:#FDE8EF;--cream:#FFF7F9;--mink:#C4899E;
  --plum:#7A3A52;--sub:#9A6878;--border:#F0C8D8;--white:#fff;
  --sh:0 8px 40px rgba(232,84,122,.13);--sh2:0 2px 12px rgba(232,84,122,.10);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{
  min-height:100vh;min-height:-webkit-fill-available;
  font-family:'Noto Sans KR',sans-serif;background:var(--cream);
  overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%,rgba(242,120,154,.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 10% 90%,rgba(232,84,122,.12) 0%,transparent 70%),
    var(--cream);
}
.app{
  position:relative;z-index:1;height:100vh;height:100dvh;
  display:flex;flex-direction:column;max-width:480px;margin:0 auto;
}
header{
  padding:calc(var(--safe-top) + 14px) 20px 12px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:rgba(255,247,249,.9);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
}
.logo{font-family:'DM Serif Display',serif;font-size:24px;letter-spacing:-.5px;color:var(--rose)}
.logo span{color:var(--plum);font-style:italic}
.gps-badge{
  display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--sub);
  background:var(--white);border:1px solid var(--border);
  padding:5px 11px;border-radius:20px;box-shadow:var(--sh2);
}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .4s;flex-shrink:0}
.dot.on{background:#4CAF50;animation:gp 1.6s infinite}
.dot.err{background:var(--rose)}
@keyframes gp{0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.4)}50%{box-shadow:0 0 0 5px rgba(76,175,80,0)}}
main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 16px calc(var(--safe-bot) + 20px);
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;scrollbar-width:none;
}
main::-webkit-scrollbar{display:none}
.screen{display:none;flex-direction:column;gap:12px}
.screen.active{display:flex}

/* 검색 */
.hero{
  background:linear-gradient(145deg,var(--plum),#5C2A3E);
  border-radius:24px;padding:22px 20px;
  box-shadow:0 12px 40px rgba(122,58,82,.28);position:relative;overflow:hidden;
}
.hero::before{content:'';position:absolute;top:-24px;right:-24px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.hero h2{font-family:'DM Serif Display',serif;font-size:19px;color:#fff;margin-bottom:3px}
.hero p{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:14px;line-height:1.5}
.srow{display:flex;gap:8px}
.sinput{
  flex:1;padding:14px 16px;border-radius:13px;border:none;outline:none;
  background:rgba(255,255,255,.14);color:#fff;font-size:16px;
  font-family:'Noto Sans KR',sans-serif;
}
.sinput::placeholder{color:rgba(255,255,255,.4)}
.sinput:focus{background:rgba(255,255,255,.22)}
.sbtn{padding:14px 18px;border-radius:13px;border:none;background:var(--rose);color:#fff;font-size:18px;cursor:pointer;min-width:52px}
.sbtn:active{transform:scale(.92)}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{
  padding:8px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  border:1.5px solid var(--border);background:var(--white);color:var(--sub);
  font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;
}
.chip.on{background:var(--rose);color:#fff;border-color:var(--rose)}
.results{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden}
.ri{padding:14px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.ri:last-child{border-bottom:none}
.ri:active{background:var(--blush)}
.ri .rn{font-size:14px;font-weight:600;color:var(--plum);line-height:1.3}
.ri .ra{font-size:11px;color:var(--sub);margin-top:3px}
.empty{padding:24px;text-align:center;font-size:13px;color:var(--sub);line-height:1.7}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:2px 4px}
#list-label{font-size:12px;font-weight:600;color:var(--mink);letter-spacing:.3px}
.nearby-btn{font-size:11px;color:var(--rose);background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;padding:0;font-weight:600}

/* 지도 화면 */
.cbadge{
  background:var(--white);border-radius:16px;padding:13px 16px;
  border:1px solid var(--border);box-shadow:var(--sh2);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.cn{font-size:14px;font-weight:600;color:var(--plum);line-height:1.3}
.ca{font-size:11px;color:var(--sub);margin-top:2px}
.chbtn{
  font-size:12px;color:var(--rose);background:var(--blush);border:1px solid var(--rose-pale);
  border-radius:10px;padding:7px 12px;cursor:pointer;white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;flex-shrink:0;font-weight:600;
}

/* 카카오맵 */
.mapwrap{
  border-radius:20px;overflow:hidden;box-shadow:var(--sh);
  position:relative;border:1px solid var(--border);
}
#kakao-map{width:100%;height:calc(100vw - 32px);max-height:360px;display:block}
.pinc{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-100%);
  font-size:36px;pointer-events:none;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.35));z-index:10;
}
.map-tip{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(122,58,82,.88);backdrop-filter:blur(6px);
  color:#fff;font-size:11px;font-weight:500;
  padding:6px 13px;border-radius:20px;white-space:nowrap;
  pointer-events:none;z-index:10;
}

/* 지도 타입 탭 */
.maptabs{display:flex;gap:8px}
.mtab{
  flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--white);color:var(--sub);font-size:13px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;text-align:center;
}
.mtab.on{background:var(--plum);color:#fff;border-color:var(--plum)}

/* 버튼 */
.cfmbtn{
  background:linear-gradient(135deg,var(--rose),var(--rose-lt));
  color:#fff;border:none;border-radius:16px;padding:17px;font-size:16px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  box-shadow:0 6px 24px rgba(232,84,122,.35);width:100%;
}
.cfmbtn:active{transform:scale(.97);opacity:.9}

/* 거리 화면 */
.dcard{
  background:linear-gradient(145deg,var(--plum) 0%,#5C2A3E 100%);
  border-radius:28px;padding:32px 24px;
  box-shadow:0 16px 48px rgba(122,58,82,.35);
  text-align:center;position:relative;overflow:hidden;
}
.dcard::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);pointer-events:none}
.dlabel{font-size:11px;font-weight:500;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:8px}
.dval{font-family:'DM Mono',monospace;font-size:76px;font-weight:500;line-height:1;color:#fff;letter-spacing:-3px;transition:opacity .25s}
.dunit{font-size:20px;font-weight:300;color:rgba(255,255,255,.55);margin-top:4px;margin-bottom:18px}
.dsub{display:flex;justify-content:center;gap:24px}
.dsi .sv{font-family:'DM Mono',monospace;font-size:16px;color:var(--rose-pale);font-weight:500}
.dsi .sl{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px;letter-spacing:.8px}
.dvr{width:1px;background:rgba(255,255,255,.12);align-self:stretch}
.srow2{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--white);border-radius:14px;padding:13px 18px;
  border:1px solid var(--border);box-shadow:var(--sh2);
}
.srow2 .sl2{font-size:12px;color:var(--sub)}
.srow2 .sv2{font-family:'DM Mono',monospace;font-size:13px;color:var(--rose);font-weight:500}
.brow{display:flex;gap:10px}
.bhalf{
  flex:1;padding:15px;border-radius:14px;border:none;font-size:13px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
}
.b1{background:var(--blush);color:var(--rose);border:1.5px solid var(--rose-pale)}
.b2{background:var(--blush);color:var(--plum);border:1.5px solid var(--border)}
.b1:active,.b2:active{opacity:.8}
.homebtn{
  width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--border);
  background:var(--white);color:var(--sub);font-size:13px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .15s;
}
.homebtn:active{background:var(--blush)}

.toast{
  position:fixed;bottom:calc(var(--safe-bot) + 24px);left:50%;transform:translateX(-50%);
  background:var(--plum);color:#fff;padding:12px 22px;border-radius:12px;
  font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);
  opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:9999;
}
.toast.show{opacity:1}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .35s ease both}
.fu1{animation-delay:.03s}.fu2{animation-delay:.09s}.fu3{animation-delay:.15s}.fu4{animation-delay:.21s}

/* ── 푸터 ── */
footer{
  text-align:center;padding:14px 20px calc(var(--safe-bot) + 14px);
  font-size:11px;color:var(--sub);line-height:1.8;
  border-top:1px solid var(--border);background:rgba(255,247,249,.7);
  backdrop-filter:blur(8px);flex-shrink:0;
}
footer a{color:var(--mink);text-decoration:none}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Pin<span>Point</span></div>
    <div class="gps-badge"><div class="dot" id="dot"></div><span id="gpstxt">GPS 대기</span></div>
  </header>
  <main>

    <!-- SCREEN 1: 검색 -->
    <div class="screen active" id="s1">
      <div class="hero fu fu1">
        <h2>⛳ 골프장을 검색하세요</h2>
        <p>이름 또는 지역으로 검색 · 전국 주요 골프장 내장</p>
        <div class="srow">
          <input class="sinput" id="kw" type="text"
            placeholder="예: 유성, 한미르, 제주"
            autocomplete="off" autocorrect="off" spellcheck="false" inputmode="search">
          <button class="sbtn" onclick="doSearch()">🔍</button>
        </div>
      </div>
      <div class="chips fu fu2" id="chips"></div>
      <div class="list-header fu fu2"><span id="list-label">📍 내 주변 골프장</span><button class="nearby-btn" onclick="showNearby()">📍 내 주변</button></div>
      <div class="results" id="results" style="display:none"></div>
    </div>

    <!-- SCREEN 2: 카카오맵 + 핀 고정 -->
    <div class="screen" id="s2">
      <div class="cbadge fu fu1">
        <div><div class="cn" id="cname">—</div><div class="ca" id="caddr">—</div></div>
        <button class="chbtn" onclick="go(1)">골프장 변경</button>
      </div>
      <div class="mapwrap fu fu2">
        <div id="kakao-map"></div>
        <div class="pinc">📍</div>
        <div class="map-tip">지도 드래그 → 📍를 그린에 맞추세요</div>
      </div>
      <div class="maptabs fu fu3">
        <button class="mtab on" id="tab-road" onclick="setMapType('ROADMAP')">🗺️ 일반 (홀번호)</button>
        <button class="mtab" id="tab-sky" onclick="setMapType('SKYVIEW')">🛰️ 위성</button>
      </div>
      <button class="cfmbtn fu fu4" onclick="confirmPin()">📍 이 위치로 핀 고정하기</button>
    </div>

    <!-- SCREEN 3: 거리 측정 -->
    <div class="screen" id="s3">
      <div class="cbadge fu fu1">
        <div><div class="cn" id="dname">—</div><div class="ca" id="daddr">—</div></div>
      </div>
      <div class="dcard fu fu2">
        <div class="dlabel">그린 센터까지</div>
        <div class="dval" id="dm">—</div>
        <div class="dunit">m</div>
        <div class="dsub">
          <div class="dsi"><div class="sv" id="dyd">—</div><div class="sl">야드 (yd)</div></div>
          <div class="dvr"></div>
          <div class="dsi"><div class="sv" id="dft">—</div><div class="sl">피트 (ft)</div></div>
        </div>
      </div>
      <div class="srow2 fu fu3">
        <span class="sl2">📍 GPS 정확도</span>
        <span class="sv2" id="acc">측정 중...</span>
      </div>
      <div class="brow fu fu4">
        <button class="bhalf b1" onclick="go(2)">📍 핀 다시 찍기</button>
        <button class="bhalf b2" onclick="refresh()">🔄 위치 새로고침</button>
      </div>
      <button class="homebtn fu fu4" onclick="go(1)">🏠 골프장 변경 / 홈으로</button>
    </div>

  </main>
  <footer>
    <p>© 2025 대전이문고 jennifer · PinPoint Golf GPS</p>
    <p>지도 데이터 © <a href="https://map.kakao.com" target="_blank">Kakao Maps</a> · GPS 거리측정 웹앱</p>
  </footer>
</div>

<div class="toast" id="toast"></div>

  {n:"군산CC",a:"전북 군산시",r:"전라",lat:35.9823,lng:126.7123},
  {n:"여수CC",a:"전남 여수시",r:"전라",lat:34.7634,lng:127.6512},
  {n:"목포CC",a:"전남 목포시",r:"전라",lat:34.8123,lng:126.4234},
  {n:"순천CC",a:"전남 순천시",r:"전라",lat:34.9512,lng:127.4823},
  {n:"핀크스GC",a:"제주 서귀포시",r:"제주",lat:33.2834,lng:126.3512},
  {n:"나인브릿지",a:"제주 서귀포시",r:"제주",lat:33.3012,lng:126.4234},
  {n:"제주CC",a:"제주 제주시",r:"제주",lat:33.4512,lng:126.5823},
  {n:"라온프라이빗타운GC",a:"제주 서귀포시",r:"제주",lat:33.2512,lng:126.5012},
  {n:"해비치CC",a:"제주 서귀포시",r:"제주",lat:33.2923,lng:126.8234},
  {n:"제주세인트포GC",a:"제주 서귀포시",r:"제주",lat:33.2712,lng:126.6123},
  {n:"스카이힐제주CC",a:"제주 제주시",r:"제주",lat:33.4234,lng:126.3823},
];
const REGIONS=["전체","대전·충청","서울·경기","강원","경상","전라","제주"];

let uPos=null, pin=null, wid=null, curRegion=null;
let kakaoMap=null, curMapType='ROADMAP';

const yd=m=>Math.round(m*1.09361), ft=m=>Math.round(m*3.28084);
function hav(a,b,c,d){
  const R=6371000,r=x=>x*Math.PI/180,dL=r(c-a),dO=r(d-b);
  const q=Math.sin(dL/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dO/2)**2;
  return R*2*Math.asin(Math.min(1,Math.sqrt(q)));
}

function go(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  if(n===2 && kakaoMap) setTimeout(()=>kakaoMap.relayout(),100);
}

// GPS
function startGPS(){
  if(wid||!navigator.geolocation)return;
  setDot('wait','연결 중...');
  wid=navigator.geolocation.watchPosition(p=>{
    uPos={lat:p.coords.latitude,lng:p.coords.longitude};
    setDot('on','GPS 연결됨');
    document.getElementById('acc').textContent='±'+Math.round(p.coords.accuracy)+'m';
    drawDist();
  },()=>setDot('err','GPS 오류'),{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}
function refresh(){
  navigator.geolocation.getCurrentPosition(p=>{
    uPos={lat:p.coords.latitude,lng:p.coords.longitude};
    document.getElementById('acc').textContent='±'+Math.round(p.coords.accuracy)+'m';
    drawDist(); toast('위치를 업데이트했습니다');
  },()=>toast('위치 업데이트 실패'),{enableHighAccuracy:true,timeout:10000});
}
function setDot(s,t){
  const d=document.getElementById('dot');
  d.className='dot'+(s==='on'?' on':s==='err'?' err':'');
  document.getElementById('gpstxt').textContent=t;
}

// 지역 칩
(function(){
  const wrap=document.getElementById('chips');
  REGIONS.forEach(r=>{
    const b=document.createElement('button');
    b.className='chip'+(r==='전체'?' on':'');
    b.textContent=r;
    b.onclick=()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
      curRegion=(r==='전체'?null:r);
      document.getElementById('kw').value='';
      if(r==='전체') showNearby();
      else showList(curRegion,null);
    };
    wrap.appendChild(b);
  });
  showNearby();
})();

// DB 목록 표시 (지역 칩용)
function showList(region,kw){
  const box=document.getElementById('results');
  const label=document.getElementById('list-label');
  let list=[...DB];
  if(region)list=list.filter(c=>c.r===region);
  if(kw&&kw.trim())list=list.filter(c=>c.n.includes(kw.trim())||c.a.includes(kw.trim()));
  box.style.display='block';
  if(label) label.textContent = region ? region+' 골프장' : '전체 골프장';
  if(!list.length){
    box.innerHTML='<div class="empty">검색 결과가 없어요.<br>다른 이름이나 지역으로 시도해보세요.</div>';
    return;
  }
  box._d=list.map(c=>({n:c.n,a:c.a,lat:c.lat,lng:c.lng}));
  box.innerHTML=list.map((c,i)=>
    '<div class="ri" onclick="pick('+i+')"><div class="rn">'+c.n+'</div><div class="ra">'+c.a+'</div></div>'
  ).join('');
}

// 위치 기반 가까운 골프장 5개 추천
function showNearby(){
  const box=document.getElementById('results');
  const label=document.getElementById('list-label');
  if(!navigator.geolocation){showList(null,null);return}
  box.style.display='block';
  box.innerHTML='<div class="empty">📡 내 위치 확인 중...</div>';
  if(label) label.textContent='📍 내 주변 골프장';
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    // 거리 계산 후 정렬
    const sorted=[...DB].map(c=>{
      const d=hav(lat,lng,c.lat,c.lng);
      return {...c,dist:d};
    }).sort((a,b)=>a.dist-b.dist).slice(0,5);
    box._d=sorted.map(c=>({n:c.n,a:c.a,lat:c.lat,lng:c.lng}));
    box.innerHTML=sorted.map((c,i)=>
      '<div class="ri" onclick="pick('+i+')">'
      +'<div class="rn">'+c.n+'</div>'
      +'<div class="ra">'+c.a+' · <span style="color:var(--rose);font-weight:600">'+distLabel(c.dist)+'</span></div>'
      +'</div>'
    ).join('');
  }, ()=>{
    // 위치 거부 시 기본 목록
    if(label) label.textContent='전체 골프장';
    showList(null,null);
  },{enableHighAccuracy:false,timeout:8000});
}

function distLabel(m){
  return m<1000 ? Math.round(m)+'m' : (m/1000).toFixed(1)+'km';
}

// 카카오 장소 검색 → 결과 목록 표시
let ps = null;
function doSearch(){
  const kw=document.getElementById('kw').value.trim();
  if(!kw){toast('골프장 이름을 입력해주세요');return}
  // 키워드에 "골프" 없으면 자동 추가
  const query = kw.includes('골프')||kw.includes('CC')||kw.includes('GC') ? kw : kw+' 골프장';
  const box=document.getElementById('results');
  box.style.display='block';
  box.innerHTML='<div class="empty">🔍 검색 중...</div>';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.querySelector('.chip').classList.add('on');
  if(!ps) ps=new kakao.maps.services.Places();
  ps.keywordSearch(query, (data,status)=>{
    if(status!==kakao.maps.services.Status.OK||!data.length){
      box.innerHTML='<div class="empty">검색 결과가 없어요.<br>다른 이름이나 지역으로 시도해보세요.</div>';
      return;
    }
    box._d=data.map(p=>({n:p.place_name,a:p.road_address_name||p.address_name,lat:parseFloat(p.y),lng:parseFloat(p.x)}));
    box.innerHTML=box._d.map((c,i)=>
      '<div class="ri" onclick="pick('+i+')"><div class="rn">'+c.n+'</div><div class="ra">'+c.a+'</div></div>'
    ).join('');
  });
}

function pick(i){
  const c=document.getElementById('results')._d[i];
  ['cname','dname'].forEach(id=>document.getElementById(id).textContent=c.n);
  ['caddr','daddr'].forEach(id=>document.getElementById(id).textContent=c.a);
  go(2);
  initKakaoMap(c.lat,c.lng);
  startGPS();
}

// ── 카카오맵 JavaScript API
function initKakaoMap(lat,lng){
  const container=document.getElementById('kakao-map');
  const options={
    center:new kakao.maps.LatLng(lat,lng),
    level:3, // 낮을수록 확대 (골프 그린 보이는 레벨)
    mapTypeId:kakao.maps.MapTypeId[curMapType]
  };
  if(kakaoMap){
    kakaoMap.setCenter(new kakao.maps.LatLng(lat,lng));
    kakaoMap.setLevel(3);
    return;
  }
  kakaoMap=new kakao.maps.Map(container,options);
  kakaoMap.setMapTypeId(kakao.maps.MapTypeId[curMapType]);
}

function setMapType(type){
  curMapType=type;
  document.getElementById('tab-road').classList.toggle('on',type==='ROADMAP');
  document.getElementById('tab-sky').classList.toggle('on',type==='SKYVIEW');
  if(kakaoMap) kakaoMap.setMapTypeId(kakao.maps.MapTypeId[type]);
}

// 지도 중심 좌표로 핀 고정
function confirmPin(){
  if(!kakaoMap){toast('지도를 불러오는 중입니다');return}
  const c=kakaoMap.getCenter();
  pin={lat:c.getLat(),lng:c.getLng()};
  go(3);
  if(uPos) drawDist();
  else toast('GPS 신호를 기다리는 중이에요');
}

function drawDist(){
  if(!pin||!uPos)return;
  const m=hav(uPos.lat,uPos.lng,pin.lat,pin.lng);
  const el=document.getElementById('dm');
  el.style.opacity='.2';
  setTimeout(()=>{
    el.textContent=Math.round(m);
    document.getElementById('dyd').textContent=yd(m);
    document.getElementById('dft').textContent=ft(m);
    el.style.opacity='1';
  },200);
}

document.getElementById('kw').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.target.blur();doSearch()}
});

let _t;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_t); _t=setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
