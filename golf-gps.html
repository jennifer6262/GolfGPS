<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PinPoint · 골프 거리측정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:     #E8547A;
    --rose-lt:  #F2789A;
    --rose-pale:#FAD4E0;
    --blush:    #FDE8EF;
    --cream:    #FFF7F9;
    --mink:     #C4899E;
    --plum:     #7A3A52;
    --txt:      #2E1A23;
    --sub:      #9A6878;
    --border:   #F0C8D8;
    --white:    #FFFFFF;
    --shadow:   0 8px 40px rgba(232,84,122,0.13);
    --shadow-sm:0 2px 12px rgba(232,84,122,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    color: var(--txt);
    overflow: hidden;
  }

  /* ── background decoration ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(242,120,154,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 10% 90%, rgba(232,84,122,0.12) 0%, transparent 70%),
      var(--cream);
    pointer-events: none;
  }

  .app {
    position: relative; z-index: 1;
    height: 100dvh;
    display: flex; flex-direction: column;
    max-width: 430px; margin: 0 auto;
    padding: 0 0 env(safe-area-inset-bottom);
  }

  /* ── header ── */
  header {
    padding: 52px 28px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 26px; letter-spacing: -0.5px;
    color: var(--rose);
  }
  .logo span { color: var(--plum); font-style: italic; }
  .gps-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500; color: var(--sub);
    background: var(--white); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 20px;
    box-shadow: var(--shadow-sm);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ccc;
    transition: background .4s;
  }
  .dot.active { background: #4CAF50; animation: pulse 1.6s infinite; }
  .dot.error  { background: var(--rose); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,.4); }
    50%      { box-shadow: 0 0 0 5px rgba(76,175,80,0); }
  }

  /* ── main scroll area ── */
  main {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 0 20px 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  main::-webkit-scrollbar { display: none; }

  /* ── permission screen ── */
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; }

  #screen-permission {
    align-items: center; justify-content: center;
    min-height: calc(100dvh - 130px);
    text-align: center; gap: 20px; padding: 20px;
  }
  .perm-icon {
    width: 90px; height: 90px; border-radius: 28px;
    background: linear-gradient(135deg, var(--rose-pale), var(--blush));
    display: grid; place-items: center;
    font-size: 42px;
    box-shadow: var(--shadow);
  }
  #screen-permission h2 { font-family:'DM Serif Display',serif; font-size:22px; color:var(--plum); }
  #screen-permission p  { font-size:14px; color:var(--sub); line-height:1.7; max-width:280px; }
  .btn-primary {
    background: linear-gradient(135deg, var(--rose), var(--rose-lt));
    color: #fff; border: none; border-radius: 16px;
    padding: 16px 40px; font-size: 16px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; box-shadow: 0 6px 24px rgba(232,84,122,.35);
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:active { transform: scale(.97); box-shadow: 0 3px 12px rgba(232,84,122,.3); }

  /* ── hole selector ── */
  #screen-main { gap: 16px; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--mink); text-transform: uppercase; margin-bottom: 2px;
  }

  .hole-selector {
    background: var(--white); border-radius: 20px;
    padding: 18px 20px; box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .hole-selector .section-label { margin-bottom: 12px; }

  .hole-scroll {
    display: flex; gap: 8px; overflow-x: auto;
    scrollbar-width: none; padding-bottom: 4px;
  }
  .hole-scroll::-webkit-scrollbar { display: none; }

  .hole-btn {
    flex-shrink: 0;
    width: 44px; height: 44px; border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-size: 14px; font-weight: 600; color: var(--sub);
    cursor: pointer;
    transition: all .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .hole-btn:active { transform: scale(.93); }
  .hole-btn.selected {
    background: linear-gradient(135deg, var(--rose), var(--rose-lt));
    color: #fff; border-color: transparent;
    box-shadow: 0 4px 14px rgba(232,84,122,.35);
    transform: scale(1.06);
  }

  /* ── distance card ── */
  .distance-card {
    background: linear-gradient(145deg, var(--plum) 0%, #5C2A3E 100%);
    border-radius: 28px; padding: 36px 28px;
    box-shadow: 0 16px 48px rgba(122,58,82,.35);
    text-align: center; position: relative; overflow: hidden;
  }
  .distance-card::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(255,255,255,.05);
  }
  .distance-card::after {
    content: '';
    position: absolute; bottom: -30px; left: -20px;
    width: 110px; height: 110px; border-radius: 50%;
    background: rgba(232,84,122,.15);
  }
  .dist-label {
    font-size: 12px; font-weight: 500; letter-spacing: 2px;
    color: rgba(255,255,255,.55); text-transform: uppercase; margin-bottom: 8px;
  }
  .dist-value {
    font-family: 'DM Mono', monospace;
    font-size: 80px; font-weight: 500; line-height: 1;
    color: #fff; letter-spacing: -3px;
    transition: all .4s cubic-bezier(.23,1,.32,1);
  }
  .dist-value.updating {
    opacity: .4; transform: scale(.96);
  }
  .dist-unit {
    font-size: 22px; font-weight: 300; color: rgba(255,255,255,.6);
    margin-top: 4px; margin-bottom: 20px;
  }
  .dist-sub {
    display: flex; justify-content: center; gap: 24px;
  }
  .dist-sub-item {
    text-align: center;
  }
  .dist-sub-item .val {
    font-family: 'DM Mono', monospace;
    font-size: 16px; color: var(--rose-pale); font-weight: 500;
  }
  .dist-sub-item .lbl {
    font-size: 10px; color: rgba(255,255,255,.4); margin-top: 2px; letter-spacing: .8px;
  }
  .divider-v {
    width: 1px; background: rgba(255,255,255,.12); align-self: stretch;
  }

  /* ── hole info card ── */
  .info-card {
    background: var(--white); border-radius: 20px;
    padding: 20px; box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .info-item { text-align: center; }
  .info-item .val {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--plum); font-weight: 400;
  }
  .info-item .lbl {
    font-size: 11px; color: var(--sub); margin-top: 2px; letter-spacing: .5px;
  }
  .info-divider {
    width: 1px; background: var(--border); align-self: stretch; margin: auto;
  }

  /* ── accuracy / status bar ── */
  .status-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white); border-radius: 14px; padding: 12px 18px;
    border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  }
  .status-row .lbl { font-size: 12px; color: var(--sub); }
  .status-row .val { font-family:'DM Mono',monospace; font-size:13px; color:var(--rose); font-weight:500; }

  /* ── no hole selected placeholder ── */
  .placeholder {
    background: var(--white); border-radius: 28px;
    padding: 48px 28px; text-align: center;
    border: 1.5px dashed var(--border);
  }
  .placeholder .ico { font-size: 48px; margin-bottom: 12px; }
  .placeholder p { font-size: 14px; color: var(--sub); line-height: 1.7; }

  /* ── error toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--plum); color: #fff;
    padding: 12px 24px; border-radius: 12px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    opacity: 0; pointer-events: none;
    transition: opacity .3s; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* ── refresh btn ── */
  .btn-refresh {
    background: var(--blush); border: 1.5px solid var(--border);
    color: var(--rose); border-radius: 12px;
    padding: 12px; font-size: 13px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; width: 100%;
    transition: background .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-refresh:active { background: var(--rose-pale); }

  /* animations */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-up { animation: fadeUp .4s ease both; }
  .fade-up-1 { animation-delay: .05s; }
  .fade-up-2 { animation-delay: .12s; }
  .fade-up-3 { animation-delay: .20s; }
  .fade-up-4 { animation-delay: .28s; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Pin<span>Point</span></div>
    <div class="gps-badge">
      <div class="dot" id="gps-dot"></div>
      <span id="gps-status-text">GPS 대기</span>
    </div>
  </header>

  <main>
    <!-- 권한 요청 화면 -->
    <div class="screen active" id="screen-permission">
      <div class="perm-icon">⛳</div>
      <h2>핀까지 거리 측정</h2>
      <p>GPS를 사용해 현재 위치에서<br>그린 센터까지의 거리를 알려드려요.<br>위치 권한이 필요합니다.</p>
      <button class="btn-primary" onclick="requestGPS()">위치 권한 허용하기</button>
    </div>

    <!-- 메인 화면 -->
    <div class="screen" id="screen-main">

      <!-- 홀 선택 -->
      <div class="hole-selector fade-up fade-up-1">
        <div class="section-label">홀 선택</div>
        <div class="hole-scroll" id="hole-scroll"></div>
      </div>

      <!-- 거리 표시 or 플레이스홀더 -->
      <div id="distance-area" class="fade-up fade-up-2"></div>

      <!-- 홀 정보 -->
      <div id="hole-info-area" class="fade-up fade-up-3"></div>

      <!-- 상태 -->
      <div class="status-row fade-up fade-up-4">
        <span class="lbl">📍 위치 정확도</span>
        <span class="val" id="accuracy-val">—</span>
      </div>

      <!-- 새로고침 -->
      <button class="btn-refresh fade-up fade-up-4" onclick="forceUpdate()">🔄 위치 새로고침</button>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 코스 데이터 (그린 센터 좌표 · 예시 데이터)
// 실제 사용 시 골프장 좌표로 교체하세요
// 좌표 출처: 각 골프장 그린 센터 GPS 좌표 (예시용 임의 좌표)
const COURSE = {
  name: "예시 골프장",
  holes: [
    // hole, par, handicap, greenCenter {lat, lng}, yardage
    { no:1,  par:4, hcp:7,  green:{lat:37.4985, lng:127.0276}, yards:385 },
    { no:2,  par:3, hcp:15, green:{lat:37.4990, lng:127.0283}, yards:162 },
    { no:3,  par:5, hcp:1,  green:{lat:37.4978, lng:127.0295}, yards:528 },
    { no:4,  par:4, hcp:9,  green:{lat:37.4969, lng:127.0301}, yards:410 },
    { no:5,  par:4, hcp:5,  green:{lat:37.4960, lng:127.0289}, yards:392 },
    { no:6,  par:3, hcp:17, green:{lat:37.4953, lng:127.0278}, yards:178 },
    { no:7,  par:5, hcp:3,  green:{lat:37.4944, lng:127.0268}, yards:545 },
    { no:8,  par:4, hcp:11, green:{lat:37.4938, lng:127.0258}, yards:403 },
    { no:9,  par:4, hcp:13, green:{lat:37.4930, lng:127.0265}, yards:370 },
    { no:10, par:4, hcp:8,  green:{lat:37.4924, lng:127.0277}, yards:388 },
    { no:11, par:3, hcp:16, green:{lat:37.4917, lng:127.0288}, yards:155 },
    { no:12, par:5, hcp:2,  green:{lat:37.4910, lng:127.0299}, yards:532 },
    { no:13, par:4, hcp:6,  green:{lat:37.4902, lng:127.0308}, yards:420 },
    { no:14, par:4, hcp:10, green:{lat:37.4895, lng:127.0295}, yards:395 },
    { no:15, par:3, hcp:18, green:{lat:37.4888, lng:127.0282}, yards:143 },
    { no:16, par:5, hcp:4,  green:{lat:37.4880, lng:127.0270}, yards:518 },
    { no:17, par:4, hcp:12, green:{lat:37.4873, lng:127.0261}, yards:406 },
    { no:18, par:4, hcp:14, green:{lat:37.4865, lng:127.0252}, yards:378 },
  ]
};

// ── state
let userPos = null;
let selectedHole = null;
let watchId = null;
let accuracyM = null;

// ── Haversine 거리 계산 (반환: 미터)
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toR = d => d * Math.PI / 180;
  const dLat = toR(lat2 - lat1);
  const dLon = toR(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toR(lat1)) * Math.cos(toR(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.aAsin(Math.sqrt(a));
}
// 안전한 asin
Math.aAsin = x => Math.asin(Math.min(1, Math.max(-1, x)));

function mToYards(m) { return Math.round(m * 1.09361); }
function mToFeet(m)  { return Math.round(m * 3.28084); }

// ── GPS 요청
function requestGPS() {
  if (!navigator.geolocation) {
    showToast('이 브라우저는 위치 서비스를 지원하지 않습니다');
    return;
  }
  setGpsBadge('waiting', '연결 중...');

  watchId = navigator.geolocation.watchPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      accuracyM = pos.coords.accuracy;
      setGpsBadge('active', 'GPS 연결됨');
      document.getElementById('accuracy-val').textContent =
        `±${Math.round(accuracyM)}m`;
      showMainScreen();
      updateDistance();
    },
    err => {
      setGpsBadge('error', 'GPS 오류');
      if (err.code === 1) showToast('위치 권한이 거부되었습니다. 설정에서 허용해주세요.');
      else showToast('위치를 가져올 수 없습니다. 다시 시도해주세요.');
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function forceUpdate() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      accuracyM = pos.coords.accuracy;
      document.getElementById('accuracy-val').textContent = `±${Math.round(accuracyM)}m`;
      updateDistance();
      showToast('위치를 업데이트했습니다');
    },
    () => showToast('위치 업데이트 실패'),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function setGpsBadge(state, text) {
  const dot = document.getElementById('gps-dot');
  dot.className = 'dot' + (state === 'active' ? ' active' : state === 'error' ? ' error' : '');
  document.getElementById('gps-status-text').textContent = text;
}

// ── 화면 전환
function showMainScreen() {
  document.getElementById('screen-permission').classList.remove('active');
  const main = document.getElementById('screen-main');
  main.classList.add('active');
  if (main.querySelector('#hole-scroll').children.length === 0) {
    buildHoleButtons();
  }
}

// ── 홀 버튼 생성
function buildHoleButtons() {
  const scroll = document.getElementById('hole-scroll');
  COURSE.holes.forEach(h => {
    const btn = document.createElement('button');
    btn.className = 'hole-btn';
    btn.textContent = h.no;
    btn.dataset.hole = h.no;
    btn.addEventListener('click', () => selectHole(h.no));
    scroll.appendChild(btn);
  });
}

// ── 홀 선택
function selectHole(no) {
  selectedHole = no;
  document.querySelectorAll('.hole-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.hole) === no);
  });
  updateDistance();
}

// ── 거리 업데이트
function updateDistance() {
  const distArea = document.getElementById('distance-area');
  const infoArea = document.getElementById('hole-info-area');

  if (!selectedHole) {
    distArea.innerHTML = `
      <div class="placeholder">
        <div class="ico">🏌️</div>
        <p>위의 홀 번호를 선택하면<br>그린까지 거리를 알려드려요</p>
      </div>`;
    infoArea.innerHTML = '';
    return;
  }

  const hole = COURSE.holes.find(h => h.no === selectedHole);
  if (!hole) return;

  if (!userPos) {
    distArea.innerHTML = `
      <div class="placeholder">
        <div class="ico">📡</div>
        <p>GPS 신호를 가져오는 중입니다.<br>잠시만 기다려주세요.</p>
      </div>`;
    return;
  }

  const distM  = haversine(userPos.lat, userPos.lng, hole.green.lat, hole.green.lng);
  const distYd = mToYards(distM);
  const distM2 = Math.round(distM);

  // 거리 카드
  const valEl = distArea.querySelector('.dist-value');
  if (valEl) {
    valEl.classList.add('updating');
    setTimeout(() => { valEl.textContent = distYd; valEl.classList.remove('updating'); }, 200);
  } else {
    distArea.innerHTML = `
      <div class="distance-card">
        <div class="dist-label">그린 센터까지</div>
        <div class="dist-value">${distYd}</div>
        <div class="dist-unit">yards</div>
        <div class="dist-sub">
          <div class="dist-sub-item">
            <div class="val">${distM2}m</div>
            <div class="lbl">미터</div>
          </div>
          <div class="divider-v"></div>
          <div class="dist-sub-item">
            <div class="val">${mToFeet(distM)}ft</div>
            <div class="lbl">피트</div>
          </div>
        </div>
      </div>`;
  }

  // 홀 정보 카드
  infoArea.innerHTML = `
    <div class="info-card">
      <div class="info-item">
        <div class="val">${hole.no}번</div>
        <div class="lbl">홀</div>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <div class="val">Par ${hole.par}</div>
        <div class="lbl">파</div>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <div class="val">${hole.yards}yd</div>
        <div class="lbl">홀 거리</div>
      </div>
    </div>`;
}

// ── 토스트
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
